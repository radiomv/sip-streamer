[default]
; Catch all incoming calls (any extension)
exten => _X.,1,NoOp(Incoming call to ${EXTEN})

; Split on # to get room and PIN
; Format: 1#ROOMNUMBER*PIN
same => n,Set(AFTERHASH=${CUT(EXTEN,#,2)})
same => n,Set(ROOM=${CUT(AFTERHASH,*,1)})
same => n,Set(PIN=${CUT(AFTERHASH,*,2)})

same => n,NoOp(Room: ${ROOM})
same => n,Answer()
same => n,ConfBridge(${ROOM},bridge_profile,user_profile)
same => n,Hangup()
